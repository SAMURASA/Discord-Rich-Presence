<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord-Rich-Presence</title>
</head>
<body>


    <div>
    <table>
        <td>cfg</td>
        <tr></tr>
        <td>clientId</td>
        <td><input type="text" class="clientId"></td>
        <tr></tr>
        <td>state</td>
        <td><input type="text" class="state"></td>
        <tr></tr>
        <td>largeimg</td>
        <td><input type="text" class="largeimg"></td>
        <tr></tr>
        <td>largetext</td>
        <td><input type="text" class="largetext"></td>
        <tr></tr>
        <td>Button Label</td>
        <td><input type="text" class="ButtonLabel"></td>
        <tr></tr>
        <td>Button Link</td>
        <td><input type="text" class="ButtonLink"></td>
        <tr></tr>
        <!-- <input type="text" class="ButtonLabelt">
        <input type="text" class="ButtonLinkt"> -->
        <td><td><button class="set" role="button">Set</button></td></td>

    </table>
    </div>
    <script>
// var imagerpc = localStorage.getItem("imagerpc");
// var value = localStorage.getItem("buttonload");
window.$ = window.jQuery = require('jquery');


$(".set").on("click",function(){
            localStorage.setItem("clientId", $(".clientId").val());
            localStorage.setItem("state", $(".state").val());
            localStorage.setItem("largeimg", $(".largeimg").val());
            localStorage.setItem("largetext", $(".largetext").val());
            localStorage.setItem("ButtonLabel", $(".ButtonLabel").val());
            localStorage.setItem("ButtonLink", $(".ButtonLink").val());
            // localStorage.setItem("ButtonLabelt",  $(".ButtonLabelt").val());
            // localStorage.setItem("ButtonLinkt", $(".ButtonLinkt").val());
            location.reload();
        
        })

//         $('.ButtonLinkt').hide();
// $('.ButtonLabelt').hide();

$(".clientId").attr("value", localStorage.getItem("clientId"))
$(".state").attr("value", localStorage.getItem("state"))
$(".largeimg").attr("value", localStorage.getItem("largeimg"))
$(".largetext").attr("value", localStorage.getItem("largetext"))
$(".ButtonLabel").attr("value", localStorage.getItem("ButtonLabel"))
$(".ButtonLink").attr("value", localStorage.getItem("ButtonLink"))
// $(".ButtonLabelt").attr("value", localStorage.getItem("ButtonLabelt"))
// $(".ButtonLinkt").attr("value", localStorage.getItem("ButtonLinkt"))
        //прировнять к изначальным значениям
        $.getScript( "rpc.js");
    </script>

    <style>
         body{
            
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),url("https://media1.tenor.com/m/JjCtoJ5WoK4AAAAC/sunset-pixel.gif") no-repeat center center fixed; 
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
        }
        td{
            color: aliceblue;
            @font-face { font-family: Rostov; src: url('./BOWLER.otf'); }
            color: rgb(255, 255, 255);
            text-align: center; 
            vertical-align: middle;
            font-family: Rostov;
        }
        input {
            background: none;
            color: #c6c6c6;
            font-size: 18px;
            padding: 10px 10px 10px 5px;
            display: block;
            width: 300px;
            border: none;
            border-radius: 0;
            border-bottom: 1px solid #c6c6c6;
        }
        input:focus,
        textarea:focus {
        outline: none;
        }
        input:focus ~ label, input:valid ~ label,
        textarea:focus ~ label,
        textarea:valid ~ label {
        top: -14px;
        font-size: 12px;
        color: #2196F3;
        }
        input:focus ~ .bar:before,
        textarea:focus ~ .bar:before {
        width: 300px;
        }
.set {
  background-color: #222;
  border-radius: 4px;
  border-style: none;
  box-sizing: border-box;
  color: #fff;
  cursor: pointer;
  display: inline-block;
  font-family: "Farfetch Basis","Helvetica Neue",Arial,sans-serif;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.5;
  margin: 0;
  max-width: none;
  min-height: 35px;
  min-width: 300px;
  outline: none;
  overflow: hidden;
  padding: 9px 10px 8px;
  position: relative;
  text-align: center;
  text-transform: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  width: 20%;
}

.set:hover,
.set:focus {
  opacity: .75;
}

table{
    padding-bottom: 2%;
}

    </style>
